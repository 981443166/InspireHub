spring:
  application:
    name: inspirehub
  # ===== 默认数据源: H2 (无需安装 PostgreSQL) =====
  # 切换到 PostgreSQL: 设置 spring.profiles.active=postgres
  datasource:
    url: jdbc:h2:file:./data/inspirehub;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
  # ===== Redis (Lettuce) =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  # ===== 文件上传 =====
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  # ===== Jackson 3 (SB 4 默认) =====
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# ===== MyBatis-Plus =====
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.inspirehub.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:inspirehub-jwt-secret-key-please-change-in-production}
  expiration: 604800000  # 7 天 (ms)

# ===== 文件存储 =====
storage:
  type: local
  local:
    upload-dir: ./uploads/images
    thumbnail-suffix: _thumb
  oss:
    endpoint: ${OSS_ENDPOINT:}
    access-key: ${OSS_ACCESS_KEY:}
    secret-key: ${OSS_SECRET_KEY:}
    bucket: inspirehub-images

# ===== Knife4j (API 文档) =====
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /api/**
      packages-to-scan: com.inspirehub.controller

knife4j:
  enable: true
  setting:
    language: zh-CN
    enable-swagger-models: true
    enable-request-cache: true
    enable-filter-multipart-api-method-type: POST

# ===== Actuator =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ===== Server =====
server:
  port: 8080

# ===== 日志（含 traceId） =====
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{traceId}] %-5level %logger{36} - %msg%n"
