# PostgreSQL 配置（需要本地安装 PostgreSQL 14+）
# 激活: spring.profiles.active=postgres

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/inspirehub
    username: inspire_user
    password: ${DB_PASSWORD:inspire_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
