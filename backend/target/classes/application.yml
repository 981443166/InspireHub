spring:
  application:
    name: inspirehub
  # ===== 数据源 (PostgreSQL 14+) =====
  datasource:
    url: jdbc:postgresql://localhost:5432/inspirehub
    username: inspire_user
    password: ${DB_PASSWORD:inspire_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  # ===== Redis (Lettuce) =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  # ===== 文件上传 =====
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  # ===== Jackson 3 (SB 4 默认) =====
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# ===== MyBatis-Plus =====
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.inspirehub.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:inspirehub-jwt-secret-key-please-change-in-production}
  expiration: 604800000  # 7 天 (ms)

# ===== 文件存储 =====
storage:
  type: local  # local | oss | minio
  local:
    upload-dir: ./uploads/images
    thumbnail-suffix: _thumb
  oss:
    endpoint: ${OSS_ENDPOINT:}
    access-key: ${OSS_ACCESS_KEY:}
    secret-key: ${OSS_SECRET_KEY:}
    bucket: inspirehub-images

# ===== Knife4j (API 文档) =====
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /api/**
      packages-to-scan: com.inspirehub.controller

knife4j:
  enable: true
  setting:
    language: zh-CN
    enable-swagger-models: true
    enable-request-cache: true
    enable-filter-multipart-api-method-type: POST

# ===== Actuator =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ===== Server =====
server:
  port: 8080
