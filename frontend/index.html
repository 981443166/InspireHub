<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InspireHub v2.0</title>
    <style>
      /* 如果 React 5 秒内没有渲染，显示诊断信息 */
      #fallback-msg { display: block; }
    </style>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1A1B26;color:#cdd6f4;font-family:system-ui,sans-serif">
        <p style="font-size:16px">⏳ InspireHub 加载中…</p>
      </div>
    </div>
    <script>
      // 第 0 步：立即注销所有 SW
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(r) { r.forEach(function(s) { s.unregister(); }); });
      }
      // 5秒后如果 React 未渲染，显示提示
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.children.length === 1 && root.children[0].children.length === 1) {
          root.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#1A1B26;color:#cdd6f4;font-family:system-ui,sans-serif;gap:12px"><p style="font-size:18px;color:#F38BA8">⚠️ 加载失败</p><p style="font-size:14px;color:#9CA3AF">请清除浏览器缓存后刷新 (Ctrl+Shift+Delete)</p><p style="font-size:13px;color:#9CA3AF">或使用隐身窗口打开此页面</p></div>';
        }
      }, 5000);
    </script>
    <script type="module" src="/src/main.tsx?v=2"></script>
  </body>
</html>
